<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🏹 Archery Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f0c;
    --surface: #141710;
    --card: #1a1e16;
    --card2: #1f2419;
    --border: #2c3324;
    --gold: #c8a84b;
    --gold2: #e8c96a;
    --green: #5a8a3c;
    --green2: #7ab55c;
    --red: #b04040;
    --text: #e8e4d8;
    --muted: #8a9070;
    --accent: #4a7a30;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 17px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(ellipse at 20% 10%, rgba(90,138,60,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(200,168,75,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(20,23,16,0.95) 0%, transparent 100%);
  }

  .logo {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 1.4rem;
    color: var(--gold);
    letter-spacing: 0.05em;
    text-shadow: 0 0 30px rgba(200,168,75,0.3);
  }

  .logo span { color: var(--green2); }

  nav { display: flex; gap: 4px; }

  nav button {
    background: none;
    border: 1px solid transparent;
    color: var(--muted);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    padding: 6px 18px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  nav button:hover { color: var(--text); border-color: var(--border); }
  nav button.active { color: var(--gold); border-color: var(--gold); background: rgba(200,168,75,0.07); }

  /* ── MAIN ── */
  main {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  .view { display: none; animation: fadeIn 0.3s ease; }
  .view.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── DASHBOARD ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--gold); }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.5;
  }

  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem;
    font-weight: 600;
    color: var(--gold2);
    display: block;
  }

  .stat-label {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Chart */
  .chart-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .chart-title {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.85rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }

  canvas { width: 100% !important; }

  /* ── CARDS ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 1rem;
    color: var(--gold);
    letter-spacing: 0.08em;
  }

  .btn {
    background: var(--accent);
    border: 1px solid var(--green2);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    padding: 8px 20px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .btn:hover { background: var(--green); border-color: var(--gold); color: var(--gold); }

  .btn-sm {
    padding: 4px 12px;
    font-size: 0.85rem;
  }

  .btn-danger {
    background: rgba(176,64,64,0.15);
    border-color: var(--red);
    color: #e08080;
  }
  .btn-danger:hover { background: var(--red); color: var(--text); border-color: var(--red); }

  /* Session cards */
  .session-list { display: flex; flex-direction: column; gap: 12px; }

  .session-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: start;
    gap: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .session-card:hover { border-color: var(--green2); background: var(--card2); }

  .session-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .session-loc { color: var(--text); font-size: 1.05rem; font-weight: 600; }
  .session-meta { font-size: 0.9rem; color: var(--muted); margin-top: 4px; }

  .session-score {
    text-align: right;
  }
  .score-big {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--gold2);
  }
  .score-label { font-size: 0.8rem; color: var(--muted); }

  /* Ends table */
  .ends-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    margin-top: 12px;
  }
  .ends-table th {
    text-align: left;
    padding: 8px 12px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'Crimson Pro', serif;
  }
  .ends-table td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(44,51,36,0.5);
  }
  .ends-table tr:hover td { background: rgba(200,168,75,0.04); }

  .score-cell {
    font-weight: 600;
    color: var(--gold2);
  }
  .score-hi { color: var(--green2) !important; }
  .score-lo { color: var(--red) !important; }

  /* ── MODAL ── */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px;
    width: min(480px, 95vw);
    max-height: 90vh;
    overflow-y: auto;
    animation: fadeIn 0.2s ease;
  }

  .modal h2 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 1rem;
    color: var(--gold);
    margin-bottom: 24px;
    letter-spacing: 0.08em;
  }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    padding: 9px 12px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--gold);
  }
  .form-group select option { background: var(--surface); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* Detail panel */
  .detail-panel {
    display: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px;
    margin-top: 16px;
  }
  .detail-panel.open { display: block; animation: fadeIn 0.2s ease; }

  .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .detail-title {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.9rem;
    color: var(--gold2);
  }

  /* Equipment grid */
  .equip-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }

  .equip-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: border-color 0.2s;
  }
  .equip-card:hover { border-color: var(--green2); }

  .equip-type {
    font-size: 0.75rem;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-family: 'JetBrains Mono', monospace;
  }
  .equip-name { font-size: 1.05rem; font-weight: 600; color: var(--text); }
  .equip-brand { font-size: 0.9rem; color: var(--muted); }
  .equip-notes { font-size: 0.85rem; color: var(--muted); font-style: italic; }

  .equip-actions { margin-top: 8px; display: flex; justify-content: flex-end; }

  /* Target SVG */
  .target-display {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 12px 0;
  }

  /* Score color gradient */
  .end-bar {
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--red), var(--gold), var(--green2));
    margin-top: 4px;
    position: relative;
    overflow: hidden;
  }
  .end-bar-fill {
    height: 100%;
    background: var(--gold2);
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  /* Pill badge */
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
  }
  .badge-gold { background: rgba(200,168,75,0.15); color: var(--gold2); border: 1px solid rgba(200,168,75,0.3); }
  .badge-green { background: rgba(90,138,60,0.15); color: var(--green2); border: 1px solid rgba(90,138,60,0.3); }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    font-style: italic;
    font-size: 1.05rem;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--card2);
    border: 1px solid var(--green2);
    color: var(--green2);
    padding: 12px 20px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    z-index: 999;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">🏹 Archery <span>Tracker</span></div>
  <nav>
    <button class="active" onclick="showView('dashboard')">Dashboard</button>
    <button onclick="showView('sessions')">Sessions</button>
    <button onclick="showView('equipment')">Equipment</button>
  </nav>
</header>

<main>

  <!-- DASHBOARD -->
  <div class="view active" id="view-dashboard">
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><span class="stat-num" id="s-sessions">—</span><div class="stat-label">Sessions</div></div>
      <div class="stat-card"><span class="stat-num" id="s-ends">—</span><div class="stat-label">Total Ends</div></div>
      <div class="stat-card"><span class="stat-num" id="s-best-end">—</span><div class="stat-label">Best End</div></div>
      <div class="stat-card"><span class="stat-num" id="s-avg">—</span><div class="stat-label">Avg End Score</div></div>
      <div class="stat-card"><span class="stat-num" id="s-grouping">—</span><div class="stat-label">Best Grouping (cm)</div></div>
    </div>

    <div class="chart-wrap">
      <div class="chart-title">SESSION SCORE PROGRESSION</div>
      <canvas id="progressChart" height="220"></canvas>
    </div>

    <div class="chart-wrap">
      <div class="chart-title">AVG GROUPING OVER TIME (cm — lower is tighter)</div>
      <canvas id="groupingChart" height="180"></canvas>
    </div>
  </div>

  <!-- SESSIONS -->
  <div class="view" id="view-sessions">
    <div class="section-header">
      <div class="section-title">Sessions</div>
      <button class="btn" onclick="openModal('session')">+ New Session</button>
    </div>
    <div class="session-list" id="session-list"></div>
    <div class="detail-panel" id="detail-panel">
      <div class="detail-header">
        <div class="detail-title" id="detail-title">Ends</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn btn-sm" onclick="openModal('end')">+ Add End</button>
          <button class="btn btn-sm btn-danger" onclick="deleteCurrentSession()">Delete Session</button>
          <button class="btn btn-sm" onclick="closeDetail()">✕ Close</button>
        </div>
      </div>
      <div id="ends-container"></div>
    </div>
  </div>

  <!-- EQUIPMENT -->
  <div class="view" id="view-equipment">
    <div class="section-header">
      <div class="section-title">Equipment</div>
      <button class="btn" onclick="openModal('equipment')">+ Add Equipment</button>
    </div>
    <div class="equip-grid" id="equip-grid"></div>
  </div>

</main>

<!-- MODALS -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<div id="toast"></div>

<!-- Simple charting (no external deps) -->
<script>
const API = '';
let currentSessionId = null;
let statsData = null;

// ── NAV ─────────────────────────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('nav button').forEach((b,i) => {
    b.classList.toggle('active', b.textContent.toLowerCase().includes(name));
  });
  if (name === 'dashboard') loadDashboard();
  if (name === 'sessions') loadSessions();
  if (name === 'equipment') loadEquipment();
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── API ──────────────────────────────────────────────────────────────────────
async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + '/api' + path, opts);
  return r.json();
}

// ── DASHBOARD ────────────────────────────────────────────────────────────────
async function loadDashboard() {
  const data = await api('/stats');
  statsData = data;
  const t = data.totals;
  document.getElementById('s-sessions').textContent = t.total_sessions;
  document.getElementById('s-ends').textContent = t.total_ends;
  document.getElementById('s-best-end').textContent = t.best_end;
  document.getElementById('s-avg').textContent = t.avg_end_score.toFixed(1);
  document.getElementById('s-grouping').textContent = t.best_grouping > 0 ? t.best_grouping.toFixed(1) : '—';
  drawChart('progressChart', data.sessions_chart, 'total', '#c8a84b', true);
  drawChart('groupingChart', data.sessions_chart, 'avg_group', '#5a8a3c', false);
}

function drawChart(id, data, key, color, fill) {
  const canvas = document.getElementById(id);
  if (!canvas || !data.length) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 800;
  const H = canvas.height;
  canvas.width = W;
  ctx.clearRect(0, 0, W, H);

  const vals = data.map(d => d[key]).filter(v => v > 0);
  if (!vals.length) return;
  const min = Math.min(...vals) * 0.85;
  const max = Math.max(...vals) * 1.1;
  const pad = { top: 20, bottom: 40, left: 50, right: 20 };
  const pw = W - pad.left - pad.right;
  const ph = H - pad.top - pad.bottom;

  const toX = i => pad.left + (i / (data.length - 1 || 1)) * pw;
  const toY = v => pad.top + ph - ((v - min) / (max - min || 1)) * ph;

  // Grid
  ctx.strokeStyle = 'rgba(44,51,36,0.6)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ph / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    const v = max - (max - min) / 4 * i;
    ctx.fillStyle = '#8a9070';
    ctx.font = '11px JetBrains Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText(v.toFixed(0), pad.left - 6, y + 4);
  }

  const pts = data.map((d, i) => [toX(i), toY(d[key] || 0)]);

  // Fill
  if (fill) {
    ctx.beginPath();
    ctx.moveTo(pts[0][0], ph + pad.top);
    pts.forEach(([x, y]) => ctx.lineTo(x, y));
    ctx.lineTo(pts[pts.length-1][0], ph + pad.top);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, pad.top, 0, H);
    grad.addColorStop(0, color + '40');
    grad.addColorStop(1, color + '00');
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Line
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) {
    const [x1,y1] = pts[i-1], [x2,y2] = pts[i];
    ctx.bezierCurveTo((x1+x2)/2, y1, (x1+x2)/2, y2, x2, y2);
  }
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Dots + labels
  pts.forEach(([x, y], i) => {
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#0d0f0c';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Date label
    ctx.fillStyle = '#8a9070';
    ctx.font = '10px JetBrains Mono, monospace';
    ctx.textAlign = 'center';
    const d = data[i].date ? data[i].date.slice(5) : '';
    ctx.fillText(d, x, H - 10);
  });
}

// ── SESSIONS ─────────────────────────────────────────────────────────────────
async function loadSessions() {
  const sessions = await api('/sessions');
  const list = document.getElementById('session-list');
  if (!sessions.length) {
    list.innerHTML = '<div class="empty-state">No sessions yet. Hit that + New Session button! 🏹</div>';
    return;
  }
  list.innerHTML = sessions.map(s => `
    <div class="session-card" onclick="openDetail(${s.id}, '${escHtml(s.location || 'Session')}')">
      <div>
        <div class="session-date">${s.date}</div>
        <div class="session-loc">${s.location || 'Unknown Location'}</div>
        <div class="session-meta">
          ${s.distance_m ? s.distance_m + 'm · ' : ''}
          ${s.bow_name ? '🏹 ' + s.bow_name : ''}
          ${s.weather ? ' · ' + s.weather : ''}
          ${s.end_count ? ` · ${s.end_count} ends` : ''}
        </div>
        ${s.notes ? `<div class="session-meta" style="margin-top:6px;font-style:italic;">${s.notes}</div>` : ''}
      </div>
      <div class="session-score">
        <div class="score-big">${s.total_score || '—'}</div>
        <div class="score-label">total pts</div>
        ${s.avg_grouping > 0 ? `<div class="score-label" style="margin-top:4px;">${s.avg_grouping.toFixed(1)} cm avg</div>` : ''}
      </div>
    </div>
  `).join('');
}

async function openDetail(sessionId, name) {
  currentSessionId = sessionId;
  document.getElementById('detail-title').textContent = name + ' — Ends';
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('detail-panel').scrollIntoView({behavior:'smooth', block:'nearest'});
  await loadEnds(sessionId);
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  currentSessionId = null;
}

async function loadEnds(sessionId) {
  const ends = await api('/sessions/' + sessionId + '/ends');
  const container = document.getElementById('ends-container');

  if (!ends.length) {
    container.innerHTML = '<div class="empty-state" style="padding:30px">No ends logged yet.</div>';
    return;
  }

  const maxScore = Math.max(...ends.map(e => e.score));
  const minScore = Math.min(...ends.map(e => e.score));

  container.innerHTML = `
    <table class="ends-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Arrows</th>
          <th>Score</th>
          <th>Max possible</th>
          <th>Grouping</th>
          <th>Notes</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${ends.map(e => {
          const pct = e.score / (e.arrows * 10) * 100;
          const cls = e.score === maxScore ? 'score-hi' : e.score === minScore ? 'score-lo' : '';
          return `<tr>
            <td>${e.end_number}</td>
            <td>${e.arrows}</td>
            <td class="score-cell ${cls}">${e.score}
              <div class="end-bar"><div class="end-bar-fill" style="width:${pct}%"></div></div>
            </td>
            <td style="color:var(--muted)">${e.arrows * 10}</td>
            <td>${e.grouping_cm ? e.grouping_cm.toFixed(1) + ' cm' : '—'}</td>
            <td style="color:var(--muted);font-family:'Crimson Pro',serif;">${e.notes || ''}</td>
            <td><button class="btn btn-sm btn-danger" onclick="deleteEnd(${e.id})">✕</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div style="margin-top:16px;display:flex;gap:20px;font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:var(--muted)">
      <span>Total: <strong style="color:var(--gold2)">${ends.reduce((a,e)=>a+e.score,0)}</strong></span>
      <span>Avg: <strong style="color:var(--gold2)">${(ends.reduce((a,e)=>a+e.score,0)/ends.length).toFixed(1)}</strong></span>
      ${ends.some(e=>e.grouping_cm) ? `<span>Best grouping: <strong style="color:var(--green2)">${Math.min(...ends.filter(e=>e.grouping_cm).map(e=>e.grouping_cm)).toFixed(1)} cm</strong></span>` : ''}
    </div>
  `;
}

async function deleteEnd(id) {
  await api('/ends/' + id, 'DELETE');
  toast('End deleted');
  await loadEnds(currentSessionId);
}

async function deleteCurrentSession() {
  if (!confirm('Delete this session and all its ends?')) return;
  await api('/sessions/' + currentSessionId, 'DELETE');
  toast('Session deleted');
  closeDetail();
  loadSessions();
}

// ── EQUIPMENT ────────────────────────────────────────────────────────────────
async function loadEquipment() {
  const equip = await api('/equipment');
  const grid = document.getElementById('equip-grid');
  if (!equip.length) {
    grid.innerHTML = '<div class="empty-state">No equipment yet.</div>';
    return;
  }
  grid.innerHTML = equip.map(e => `
    <div class="equip-card">
      <div class="equip-type">${e.type}</div>
      <div class="equip-name">${e.name}</div>
      ${e.brand ? `<div class="equip-brand">${e.brand}</div>` : ''}
      ${e.notes ? `<div class="equip-notes">${e.notes}</div>` : ''}
      <div class="equip-actions">
        <button class="btn btn-sm btn-danger" onclick="deleteEquipment(${e.id})">Remove</button>
      </div>
    </div>
  `).join('');
}

async function deleteEquipment(id) {
  await api('/equipment/' + id, 'DELETE');
  toast('Equipment removed');
  loadEquipment();
}

// ── MODALS ───────────────────────────────────────────────────────────────────
let _modalType = null;

async function openModal(type) {
  _modalType = type;
  const bg = document.getElementById('modal-bg');
  const c = document.getElementById('modal-content');
  bg.classList.add('open');

  if (type === 'session') {
    const equip = await api('/equipment');
    const bows = equip.filter(e => e.type === 'bow');
    const arrows = equip.filter(e => e.type === 'arrow');
    c.innerHTML = `
      <h2>New Session</h2>
      <div class="form-row">
        <div class="form-group"><label>Date</label><input type="date" id="f-date" value="${new Date().toISOString().slice(0,10)}"/></div>
        <div class="form-group"><label>Distance (m)</label><input type="number" id="f-dist" placeholder="18"/></div>
      </div>
      <div class="form-group"><label>Location</label><input type="text" id="f-loc" placeholder="Club Range A"/></div>
      <div class="form-group"><label>Weather</label><input type="text" id="f-weather" placeholder="Sunny, 5mph wind"/></div>
      <div class="form-row">
        <div class="form-group"><label>Bow</label>
          <select id="f-bow"><option value="">— Select —</option>${bows.map(b=>`<option value="${b.id}">${b.name}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label>Arrows</label>
          <select id="f-arrow"><option value="">— Select —</option>${arrows.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select>
        </div>
      </div>
      <div class="form-group"><label>Notes</label><textarea id="f-notes" rows="2"></textarea></div>
      <div class="modal-actions">
        <button class="btn btn-sm" style="background:none;border-color:var(--border);color:var(--muted)" onclick="closeModal()">Cancel</button>
        <button class="btn btn-sm" onclick="submitSession()">Save Session</button>
      </div>
    `;
  }

  if (type === 'end') {
    c.innerHTML = `
      <h2>Log End</h2>
      <div class="form-row">
        <div class="form-group"><label>Score</label><input type="number" id="f-score" min="0" max="60" placeholder="54"/></div>
        <div class="form-group"><label>Arrows shot</label><input type="number" id="f-arrows" value="6" min="1" max="12"/></div>
      </div>
      <div class="form-group"><label>Grouping (cm)</label><input type="number" id="f-group" step="0.1" placeholder="8.5"/></div>
      <div class="form-group"><label>Notes</label><input type="text" id="f-notes" placeholder="Good form, slight wind drift..."/></div>
      <div class="modal-actions">
        <button class="btn btn-sm" style="background:none;border-color:var(--border);color:var(--muted)" onclick="closeModal()">Cancel</button>
        <button class="btn btn-sm" onclick="submitEnd()">Log End</button>
      </div>
    `;
  }

  if (type === 'equipment') {
    c.innerHTML = `
      <h2>Add Equipment</h2>
      <div class="form-group"><label>Name</label><input type="text" id="f-name" placeholder="Hoyt Recurve Pro"/></div>
      <div class="form-group"><label>Type</label>
        <select id="f-type">
          <option value="bow">Bow</option>
          <option value="arrow">Arrow</option>
          <option value="sight">Sight</option>
          <option value="stabilizer">Stabilizer</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group"><label>Brand</label><input type="text" id="f-brand" placeholder="Hoyt"/></div>
      <div class="form-group"><label>Notes</label><input type="text" id="f-notes" placeholder="68&quot; 40lbs"/></div>
      <div class="modal-actions">
        <button class="btn btn-sm" style="background:none;border-color:var(--border);color:var(--muted)" onclick="closeModal()">Cancel</button>
        <button class="btn btn-sm" onclick="submitEquipment()">Add</button>
      </div>
    `;
  }
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

function val(id) { return document.getElementById(id)?.value || null; }

async function submitSession() {
  const body = {
    date: val('f-date') || new Date().toISOString().slice(0,10),
    location: val('f-loc'),
    weather: val('f-weather'),
    distance_m: val('f-dist') ? parseInt(val('f-dist')) : null,
    bow_id: val('f-bow') ? parseInt(val('f-bow')) : null,
    arrow_id: val('f-arrow') ? parseInt(val('f-arrow')) : null,
    notes: val('f-notes')
  };
  await api('/sessions', 'POST', body);
  closeModal();
  toast('Session saved!');
  loadSessions();
}

async function submitEnd() {
  if (!currentSessionId) { toast('No session selected'); return; }
  const score = val('f-score');
  if (!score) { toast('Please enter a score'); return; }
  await api('/sessions/' + currentSessionId + '/ends', 'POST', {
    score: parseInt(score),
    arrows: parseInt(val('f-arrows') || '6'),
    grouping_cm: val('f-group') ? parseFloat(val('f-group')) : null,
    notes: val('f-notes')
  });
  closeModal();
  toast('End logged!');
  await loadEnds(currentSessionId);
}

async function submitEquipment() {
  const name = val('f-name');
  if (!name) { toast('Please enter a name'); return; }
  await api('/equipment', 'POST', {
    name, type: val('f-type') || 'bow', brand: val('f-brand'), notes: val('f-notes')
  });
  closeModal();
  toast('Equipment added!');
  loadEquipment();
}

function escHtml(s) { return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ── INIT ─────────────────────────────────────────────────────────────────────
loadDashboard();
</script>
</body>
</html>
